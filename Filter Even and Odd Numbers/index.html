<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Even Odd Filter</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 400px;
}

button {
    padding: 5px 10px;
    margin: 5px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

.box {
    margin-top: 10px;
    padding: 10px;
    background: #eee;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Filter Even and Odd Numbers</h2>

    <input type="number" id="numInput" placeholder="Enter number">
    <button onclick="addNumber()">Add Number</button>
    <button onclick="showEven()">Show Even</button>
    <button onclick="showOdd()">Show Odd</button>
    <button onclick="clearAll()">Clear</button>

    <div class="box">
        <b>Even Numbers:</b>
        <p id="even"></p>
    </div>

    <div class="box">
        <b>Odd Numbers:</b>
        <p id="odd"></p>
    </div>
</div>

<script>
let numbers = [];

function addNumber() {
    let input = document.getElementById("numInput");
    let value = parseInt(input.value);

    if (isNaN(value)) return;

    numbers.push(value);
    input.value = "";
}

function showEven() {
    let even = numbers.filter(num => num % 2 === 0);
    document.getElementById("even").innerText = even.join(", ");
}

function showOdd() {
    let odd = numbers.filter(num => num % 2 !== 0);
    document.getElementById("odd").innerText = odd.join(", ");
}

function clearAll() {
    numbers = [];
    document.getElementById("even").innerText = "";
    document.getElementById("odd").innerText = "";
}
</script>

</body>
</html>
